name: Build ZMK firmware

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ZMK with Docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # 도커 환경 진입 전에 Git 소유권 보안 경고를 원천 차단하는 인자 주입
      - name: Build Firmware
        uses: docker://zmkfirmware/zmk-build-arm:stable
        with:
          args: /bin/sh -c "git config --global --add safe.directory /github/workspace && git config --global --add safe.directory /github/workspace/zephyr && west init -l config && west update && west zephyr-export && west build -s zmk/app -b nice_nano_v2 -- -DUSER_CONFIG_DIR=/github/workspace/config"

      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          name: nice_nano_v2_ssd1306
          path: build/zephyr/zmk.uf2
